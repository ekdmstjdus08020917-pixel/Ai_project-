<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 이미지 분석 서비스</title>
    <style>
        /* 다크 모드 기반 스타일링 */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            color: #bb86fc;
            margin-bottom: 24px;
        }

        .upload-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 이미지 미리보기 구역 */
        #preview-container {
            width: 100%;
            height: 300px;
            border: 2px dashed #333;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #1a1a1a;
        }

        #preview-img {
            max-width: 100%;
            max-height: 100%;
            display: none;
        }

        #placeholder-text {
            color: #666;
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            background: #333;
            color: white;
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .custom-file-upload:hover {
            background: #444;
        }

        textarea {
            width: 100%;
            height: 100px;
            background: #2a2a2a;
            border: 1px solid #333;
            color: white;
            padding: 12px;
            border-radius: 8px;
            resize: none;
            box-sizing: border-box;
        }

        button {
            background: #03dac6;
            color: #000;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #018786;
        }

        /* 로딩 애니메이션 */
        #loading {
            display: none;
            text-align: center;
            margin: 20px 0;
            color: #03dac6;
            font-weight: bold;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #03dac6;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 결과 창 */
        #result-section {
            margin-top: 25px;
            padding: 15px;
            background: #2a2a2a;
            border-radius: 8px;
            display: none;
        }

        .result-title {
            color: #bb86fc;
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }

        #result-text {
            line-height: 1.6;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AI 이미지 분석기</h1>
    
    <div class="upload-section">
        <!-- 이미지 업로드 및 미리보기 -->
        <label for="image-input" class="custom-file-upload">이미지 선택하기</label>
        <input type="file" id="image-input" accept="image/*">
        
        <div id="preview-container">
            <span id="placeholder-text">이미지를 업로드하면 미리보기가 표시됩니다.</span>
            <img id="preview-img" src="" alt="미리보기">
        </div>

        <!-- 질문 입력 -->
        <textarea id="prompt-input" placeholder="이미지에 대해 궁금한 점을 질문해 보세요..."></textarea>

        <!-- 모델 선택 -->
        <div style="display: flex; flex-direction: column; gap: 8px;">
            <label style="font-size: 14px; color: #bb86fc;">분석 모델 선택</label>
            <select id="model-select" style="width: 100%; padding: 12px; background: #2a2a2a; color: white; border: 1px solid #333; border-radius: 8px; cursor: pointer;">
                <option value="OLLAMA">Ollama (gemma4:e2b)</option>
                <option value="GPT">OpenAI (GPT-4o)</option>
                <option value="CHANDRA">Chandra OCR 2</option>
            </select>
        </div>

        <!-- 분석 버튼 -->
        <button id="analyze-btn">AI 분석 시작하기</button>
    </div>

    <!-- 로딩 상태 -->
    <div id="loading">
        <div class="spinner"></div>
        AI가 분석 중입니다... 잠시만 기다려 주세요.
    </div>

    <!-- 결과 표시 -->
    <div id="result-section">
        <span class="result-title">💡 분석 결과</span>
        <div id="result-text"></div>
    </div>
</div>

<script>
    const imageInput = document.getElementById('image-input');
    const previewImg = document.getElementById('preview-img');
    const placeholderText = document.getElementById('placeholder-text');
    const analyzeBtn = document.getElementById('analyze-btn');
    const promptInput = document.getElementById('prompt-input');
    const loading = document.getElementById('loading');
    const resultSection = document.getElementById('result-section');
    const resultText = document.getElementById('result-text');

    // 이미지 파일 선택 시 미리보기 표시 로직
    imageInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                previewImg.src = e.target.result;
                previewImg.style.display = 'block';
                placeholderText.style.display = 'none';
            }
            reader.readAsDataURL(file);
        }
    });

    // 분석하기 버튼 클릭 이벤트
    analyzeBtn.addEventListener('click', async () => {
        const file = imageInput.files[0];
        const prompt = promptInput.value;
        const model = document.getElementById('model-select').value;

        if (!file) {
            alert("먼저 이미지를 선택해 주세요!");
            return;
        }
        if (!prompt) {
            alert("질문을 입력해 주세요!");
            return;
        }

        // 화면 UI 초기화 (로딩 표시)
        loading.style.display = 'block';
        resultSection.style.display = 'none';
        analyzeBtn.disabled = true;

        const formData = new FormData();
        formData.append('file', file);
        formData.append('prompt', prompt);
        formData.append('model', model);

        try {
            // Node.js 프록시 서버 호출
            const response = await fetch('/proxy-analyze', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.success) {
                resultText.innerText = data.data.result;
                resultSection.style.display = 'block';
            } else {
                alert("분석 실패: " + data.message);
            }
        } catch (error) {
            console.error("통신 에러:", error);
            alert("서버와 통신하는 중 에러가 발생했습니다.");
        } finally {
            loading.style.display = 'none';
            analyzeBtn.disabled = false;
        }
    });
</script>

</body>
</html>
